<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="" />

    <!-- daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="" href="./tailwind.css" />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }

      .badge-secondary {
        background-color: #ff8a8a;
      }

      .badge-accent {
        background-color: #79ced4;
      }
      .badge-info {
        background-color: #62f97d;
      }
    </style>
  </head>
  <body class="text-gray-800 bg-[#F8FAFC]">
    <header class="bg-base-100 " >
      <div
        class="navbar gap-3    pl-14 pr-14 flex flex-col sm:flex-row justify-between items-center shadow-sm"
        >
        <div class="flex gap-1 items-center">
          <div class="flex items-center gap-1">
            <img class="w-[30px]" src="./assets/github-logo.png" alt="" />
            <a class="font-bold text-xl">GitHub Issues Tracker</a>
          </div>
        </div>

        <div class="flex gap-2   ">
       

          <label  class="input ">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input  id="input-Search" type="text" required placeholder="Search issues..." />
          </label>

          <div class=" flex text-center items-center">
             <button class="btn  btn-primary  ">
                  <i class="fa-solid fa-plus"></i>New Issue
              </button>
          </div>
        </div>
      </div>
    </header>

    <main class="w-[85%] mx-auto space-y-5">
      <section
        id="filter-section"
        class="space-x-2 flex-wrap mt-10 bg-white shadow p-6 rounded-sm"
      >
        <button
          id="all-btn"
          onclick="setActiveTab(this)"
          class="btn btn-primary"
        >
          All
        </button>

        <button
          id="open-btn"
          onclick="setActiveTab(this)"
          class="btn btn-soft btn-primary"
        >
          Open
        </button>
        <button
          id="closed-btn"
          onclick="setActiveTab(this)"
          class="btn btn-soft btn-primary"
        >
          Closed
        </button>
      </section>

      <section id="all-section" class="shadow rounded">
        <div
          class="flex flex-col sm:flex-row gap-3  items-center justify-between p-5 bg-white shadow-md rounded-t-xl"
        >
          <div class="flex items-center gap-2">
            <div class="bg-[#ece4ff] p-3 rounded-full">
              <img class="w-7" src="./assets/Aperture.png" alt="" />
            </div>

            <div>
              <h2 class="font-semibold text-xl">
                <span id="Issues-count"></span> Issues
              </h2>
              <p class="text-slate-500 text-sm">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <div class="flex items-center gap-5 font-medium">
            <p class="">
              <i class="fa-solid fa-circle text-green-500"></i> Open
            </p>
            <p class="">
              <i class="fa-solid fa-circle text-purple-500"></i> Closed
            </p>
          </div>
        </div>

        <div
          id="loading"
          class="h-[60vh] flex hidden justify-center items-center"
        >
          <span class="loading loading-ring loading-xl"></span>
        </div>

        <div
          id="card-container"
          class="bg-[#FBFBFB] border-t border-t-stone-500/30 p-6 grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-4 gap-5"
        >
          <!-- <div class="card space-y-5 p-4 bg-amber-50 shadow-2xl ">

           

          <div class="flex justify-between items-center ">
                <img src="./assets/Open-Status.png" alt="">

          </div>

          
          <div>
            <h2 class="font-semibold">Fix navigation menu on mobile devices</h2>
            <p class="text-slate-500 text-sm line-clamp-2">Application becomes slow when loading more than 1000 items. Need to implement pagination or virtual scrolling..</p>

          </div>

          <div class="flex   gap-3">
            <p class="badge badge-warning">Bug</p>
            <p class="badge badge-warning">help wanted</p>

          </div>

          <div class="border-t border-t-stone-500/30 pt-4" >
              <div class="flex  justify-between items-center">
                <p>author</p>
                 <p>createdAt</p>
              </div>
    
             // <div class="flex justify-between items-center  " >
              //    <p>Assignee: ${card.assignee ? card.assignee : "None"}  </p>
              //    <p>${formatDate(card.updatedAt)}</p>
              //  </div>
           
          </div>
          
        </div> -->
        </div>
        <!-- <div id="loading" class="h-[60vh]  flex hidden justify-center items-center">
                    <span class="loading loading-ring loading-xl"></span>
            </div> -->

        <!-- Open the modal using ID.showModal() method -->

        <dialog
          id="issue-card-modal"
          class="modal modal-bottom sm:modal-middle"
        >
          <div class="modal-box">
            <div id="modal-d" class="space-y-5">
              <div>
                <h2 id="modal-title" class="font-bold text-xl">
                  Fix broken image uploads
                </h2>

                <div
                  class="flex gap-1 justify-start text-center text-[12px] pt-1"
                >
                  <p
                    id="modal-status"
                    class="text-white font-medium p-1 pl-2 pr-2 te rounded-full"
                  >
                    status
                  </p>
                  <p id="modal-author" class="text-slate-500 p-1">
                    Opened by Fahim Ahmed
                  </p>
                  <p id="modal-createdAt" class="text-slate-500 p-1">date</p>
                </div>
              </div>

              <div>
                <span id="modal-labels"></span>
              </div>

              <div class="text-sm text-slate-500">
                <p id="modal-description">description</p>
              </div>
              <div
                class="bg-[#F8FAFC] p-4 flex justify-start gap-30 md:gap-45 items-center"
              >
                <div class="flex justify-start flex-col items-center">
                  <p id="" class="text-slate-500 text-sm">Assignee:</p>
                  <p id="modal-Assignee-name" class="font-semibold text-[16px]">
                    name
                  </p>
                </div>

                <div class="flex justify-start flex-col gap-1 items-center">
                  <p id="" class="text-slate-500 text-sm">Priority:</p>
                  <p
                    id="modal-priority"
                    class="text-center badge font-medium rounded-xl"
                  >
                    High
                  </p>
                </div>
              </div>
            </div>

            <div class="modal-action">
              <form method="dialog">
                <button class="btn btn-soft btn-primary">Close</button>
              </form>
            </div>
          </div>
        </dialog>
      </section>
    </main>

    <script src="./JS/home.js"></script>
  </body>
</html>
