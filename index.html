<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker | Login</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="" />

    <!-- daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="/tailwind.css" />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" 
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
        
      }
    </style>

  </head>

  <body class="bg-[#F8FAFC] py-15 text-gray-800">

    <section class="py-8 min-h-screen max-w-md  mx-auto bg-white rounded-xl shadow">

      <div class="text-center">
          <div class="w-[100px] mx-auto">
             <img src="./assets/github-logo.png" alt="" />
         </div>

        <h1 class="font-semibold text-2xl text-gray-800 mt-6">
          GitHub Issues Tracker
        </h1>
        <p class="text-slate-500">Sign in to manage your issues</p>

        </div>

        <div class="   ">

          <div class="card w-full max-w-sm shrink-0  mx-auto ">

            <div class="card-body  ">
              <fieldset class="fieldset rounded-box   p-2">
                <label class="label text-gray-800 font-medium "
                  >Username</label
                >
                <input
                  id="input-Username"
                  maxlength="9"
                  minlength="5"
                  type="text"
                  class="input text-slate-500"
                  placeholder="Enter Username"
                />

                <label class="label text-gray-800 font-medium mt-4 "
                  >Password</label>

                <input
                  id="input-Password"
                  type="password"
                  maxlength="8"
                  class="input text-slate-500"
                  placeholder="Enter Password"
                />

                <button
                  id="Sign-in-btn"
                  class="btn btn-primary mt-4 rounded-md"
                >
                  Sign In
                </button>
              </fieldset>

            <div class="flex items-center py-2 gap-3">
                <div class="flex-1 border-gray-300 border-t"></div>
                <span class="">OR</span>
                <div class="flex-1 border-gray-300 border-t"></div>
            </div>
              
            </div>

          </div>
          
        </div>

        <div class="pl-15 pr-15  text-center ">
            <p class=" text-slate-500 text-sm mb-5 ">Demo Credentials:</p>
            <div class="bg-[#f8fafc] rounded-md text-sm p-5">
                <p><span class="font-bold">Username: </span> admin</p>
                <p> <span class="font-bold">Password:</span> admin123</p>
            </div>

        </div>

    </section>
    <script src="./JS/login.js"></script>
  </body>
</html>
